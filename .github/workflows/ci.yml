name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Astro types
        run: npm run astro -- check

      - name: Build
        run: npm run build

      - name: Install lychee
        run: |
          curl -sfLO https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf lychee-x86_64-unknown-linux-gnu.tar.gz
          sudo install lychee-x86_64-unknown-linux-gnu/lychee /usr/local/bin/lychee

      - name: Check links
        run: |
          lychee --base "$GITHUB_WORKSPACE/dist" --no-progress \
            --exclude "fonts.googleapis.com" \
            --exclude "fonts.gstatic.com" \
            --exclude "api.web3forms.com" \
            --exclude "lesecranspastoutletemps.fr" \
            --exclude "youtube.com" \
            --exclude "schema.org" \
            dist/**/*.html
