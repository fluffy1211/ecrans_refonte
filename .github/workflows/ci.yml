name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Astro types
        run: npm run astro -- check

      - name: Build
        run: npm run build

      - name: Check links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --base dist
            --no-progress
            --exclude "fonts.googleapis.com"
            --exclude "fonts.gstatic.com"
            --exclude "api.web3forms.com"
            --exclude "lesecranspastoutletemps.fr"
            dist/**/*.html
          fail: true
